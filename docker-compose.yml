services:
  postgres:
    image: postgres:16
    container_name: sumo-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sumo}
      POSTGRES_USER: ${POSTGRES_USER:-sumo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sumo}
    volumes:
      - sumo-pgdata:/var/lib/postgresql/data

volumes:
  sumo-pgdata:
